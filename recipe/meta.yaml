{% set python_min = "3.11" %}
{% set name = "jax" %}
{% set version = "0.9.0" %}

package:
  name: jax
  version: {{ version }}

source:
  # Only pull source after PyPI release
  url: https://pypi.org/packages/source/j/jax/jax-{{ version }}.tar.gz
  sha256: e5ce9d6991333aeaad37729dd8315d29c4b094ea9476a32fb49933b556c723fb

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - importlib-metadata >=4.6
    - ml_dtypes >=0.5.0
    - numpy >=2.0
    - opt_einsum
    - scipy >=1.13
    # Change the minimum jaxlib version to _minimum_jaxlib_version in https://github.com/jax-ml/jax/blob/main/jax/version.py
    - jaxlib >=0.9.0,<=0.9.0
  run_constrained:
    # Change to nvidia-cudnn-* in https://github.com/jax-ml/jax/blob/main/jax_plugins/cuda/plugin_setup.py
    - cudnn >=9.8,<10.0

test:
  imports:
    - jax
    - jax._src
  commands:
    - pip check
  requires:
    - pip
    # Change to test the declared minimum jaxlib version
    - jaxlib ==0.9.0
    - python {{ python_min }}

about:
  home: https://github.com/jax-ml/jax
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Differentiate, compile, and transform Numpy code
  dev_url: http://github.com/jax-ml/jax

extra:
  recipe-maintainers:
    - ocefpaf
    - ericmjl
    - ngam
    - ehfd
    - conda-forge/jaxlib
